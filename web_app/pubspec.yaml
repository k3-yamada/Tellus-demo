name: tellus_demo
description: Tellus SAR infrastructure monitoring demo for Firebase Hosting.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  provider: ^6.1.2
  intl: ^0.20.2
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/data/infrastructure_data.json
    - assets/data/templates/index.json
    - assets/data/templates/dam.json
    - assets/data/templates/bridge.json
    - assets/data/templates/airport.json
    - assets/data/templates/shinkansen.json
    - assets/data/templates/port.json
    - assets/data/disaster_archive.json
    - assets/data/multi_sensor.json
    - assets/images/disaster/
    - assets/images/demo/
    - assets/images/sar/
    - assets/images/multi_sensor/
    - assets/images/templates/
