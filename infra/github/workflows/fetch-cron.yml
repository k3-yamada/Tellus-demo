name: Fetch Tellus Data

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: scripts/uv.lock

      - name: Install dependencies (locked)
        working-directory: scripts
        run: uv sync --frozen

      - name: Fetch Tellus data
        working-directory: scripts
        env:
          TELLUS_API_KEY: ${{ secrets.TELLUS_API_KEY }}
        run: uv run python fetch_tellus_data.py

      - name: Enrich thumbnails (limited)
        working-directory: scripts
        env:
          TELLUS_API_KEY: ${{ secrets.TELLUS_API_KEY }}
        run: uv run python pipeline/enrich_scenes.py ../web_app/assets/data/infrastructure_data.json 80

      - name: Build thumbnail manifest
        working-directory: scripts
        run: uv run python pipeline/thumbnail_manifest.py ../web_app/assets/data/infrastructure_data.json

      - name: Notify Slack
        if: always()
        working-directory: scripts
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          SUMMARY=$(uv run python pipeline/pipeline_summary.py ../web_app/assets/data/infrastructure_data.json)
          uv run python pipeline/notify.py "${{ job.status }}" "Weekly Tellus fetch completed" --details-json "$SUMMARY"

      - name: Upload JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-data
          path: web_app/assets/data/infrastructure_data.json
