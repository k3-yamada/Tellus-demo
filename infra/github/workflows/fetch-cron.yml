name: Fetch Tellus Data

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: scripts
        run: pip install -r requirements.txt

      - name: Fetch Tellus data
        working-directory: scripts
        env:
          TELLUS_API_KEY: ${{ secrets.TELLUS_API_KEY }}
        run: python fetch_tellus_data.py

      - name: Enrich thumbnails (limited)
        working-directory: scripts
        env:
          TELLUS_API_KEY: ${{ secrets.TELLUS_API_KEY }}
        run: python pipeline/enrich_scenes.py ../web_app/assets/data/infrastructure_data.json 80

      - name: Build thumbnail manifest
        working-directory: scripts
        run: python pipeline/thumbnail_manifest.py ../web_app/assets/data/infrastructure_data.json

      - name: Notify Slack
        if: always()
        working-directory: scripts
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          SUMMARY=$(python pipeline/pipeline_summary.py ../web_app/assets/data/infrastructure_data.json)
          python pipeline/notify.py "${{ job.status }}" "Weekly Tellus fetch completed" --details-json "$SUMMARY"

      - name: Upload JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-data
          path: web_app/assets/data/infrastructure_data.json
